# GitHub Actions workflow for building the OrcaSlicer Cloud Slice Engine
# This workflow builds a headless slicing engine for cloud deployment

name: Build Cloud Slice Engine

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release artifact'
        required: false
        default: 'false'
        type: boolean

  # Trigger on push to specific branches
  push:
    branches:
      - main
      - release/*
      - 'engine-build'
    paths:
      - 'src/orca-slice-engine/**'
      - 'src/libslic3r/**'
      - 'src/libnest2d/**'
      - 'deps/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/build-cloud-engine.yml'

  # Trigger on pull requests
  pull_request:
    branches:
      - main
    paths:
      - 'src/orca-slice-engine/**'
      - 'src/libslic3r/**'
      - 'src/libnest2d/**'
      - 'deps/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/build-cloud-engine.yml'

env:
  # CMake version
  CMAKE_VERSION: "~3.28.0"

jobs:
  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-22.04  # Use older Ubuntu for better glibc compatibility

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: 'true'
          submodules: 'recursive'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            git \
            g++ \
            build-essential \
            ninja-build \
            libgl1-mesa-dev \
            m4 \
            libglew-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libudev-dev \
            autoconf \
            curl \
            libunwind-dev \
            texinfo \
            file \
            pkgconf \
            extra-cmake-modules \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libdbus-1-dev

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}

      - name: Get version info
        id: version
        run: |
          # Extract version from version.inc
          VER_PURE=$(grep 'set(Snapmaker_VERSION' version.inc | cut -d '"' -f2)
          DATE=$(date +'%Y%m%d')

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VER="PR-${{ github.event.number }}"
          else
            VER="V${VER_PURE}"
          fi

          echo "ver=${VER}" >> $GITHUB_OUTPUT
          echo "ver_pure=${VER_PURE}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

          # Update version.inc with date
          sed -i "s/+UNKNOWN/_${DATE}/" version.inc

      - name: Compute cache key
        id: cache-key
        run: |
          echo "key=orca-deps-headless-${{ runner.os }}-${{ hashFiles('deps/**/CMakeLists.txt', 'deps/**/*.cmake') }}" >> $GITHUB_OUTPUT
          echo "Computed cache key: orca-deps-headless-${{ runner.os }}-${{ hashFiles('deps/**/CMakeLists.txt', 'deps/**/*.cmake') }}"

      - name: List existing caches
        run: |
          echo "=== Listing caches ==="
          gh cache list --limit 20 2>/dev/null || echo "Unable to list caches"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            deps/build/destdir
            deps/DL_CACHE
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            orca-deps-headless-${{ runner.os }}-
          save-always: true

      - name: Debug cache status
        run: |
          echo "Cache hit: '${{ steps.cache-deps.outputs.cache-hit }}'"
          echo "Cache key used: ${{ steps.cache-key.outputs.key }}"
          echo "=== deps/build directory ==="
          ls -la deps/build/ 2>/dev/null || echo "deps/build not found"
          echo "=== destdir directory ==="
          ls -la deps/build/destdir/ 2>/dev/null || echo "destdir not found"

      - name: Build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          # Build dependencies without GUI components (FLATPAK=ON skips wxWidgets)
          mkdir -p deps/build
          cmake -S deps -B deps/build -G Ninja \
            -DSLIC3R_PCH=ON \
            -DFLATPAK=ON \
            -DDESTDIR="${{ github.workspace }}/deps/build/destdir" \
            -DDEP_DOWNLOAD_DIR="${{ github.workspace }}/deps/DL_CACHE"
          cmake --build deps/build

      - name: Configure CMake for Cloud Engine
        run: |
          # Debug: show destdir structure
          echo "=== destdir structure ==="
          ls -la ${{ github.workspace }}/deps/build/destdir/ || echo "destdir not found"
          echo "=== lib directory ==="
          ls -la ${{ github.workspace }}/deps/build/destdir/lib/ 2>/dev/null | head -20 || echo "lib not found"

          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps/build/destdir" \
            -DSLIC3R_STATIC=1 \
            -DSLIC3R_GUI=OFF \
            -DORCA_TOOLS=OFF \
            -DBUILD_TESTS=OFF

      - name: Build Cloud Slice Engine
        run: |
          cmake --build build --target orca-slice-engine -j$(nproc)

      - name: Verify build
        run: |
          ls -la build/src/orca-slice-engine/
          file build/src/orca-slice-engine/orca-slice-engine
          # Test if executable runs
          ./build/src/orca-slice-engine/orca-slice-engine --help || true

      - name: Create release package
        id: package
        run: |
          # Create package directory structure
          mkdir -p package/orca-slice-engine/resources
          mkdir -p package/orca-slice-engine/lib

          # Copy executable
          cp build/src/orca-slice-engine/orca-slice-engine package/orca-slice-engine/
          chmod +x package/orca-slice-engine/orca-slice-engine

          # Copy profiles directory
          cp -r resources/profiles package/orca-slice-engine/resources/

          # Copy info directory (nozzle info, etc.)
          cp -r resources/info package/orca-slice-engine/resources/

          # Bundle required shared libraries
          echo "=== Bundling shared libraries ==="
          EXE="package/orca-slice-engine/orca-slice-engine"
          LIBDIR="package/orca-slice-engine/lib"

          # Get all required shared libraries (exclude system libs)
          ldd "$EXE" | while read line; do
            lib=$(echo "$line" | awk '{print $1}')
            path=$(echo "$line" | awk '{print $3}')

            # Skip if it's linux-vdso, ld-linux, or not a real path
            if [[ "$lib" == "linux-vdso"* ]] || [[ "$lib" == "ld-linux"* ]] || [[ -z "$path" ]] || [[ "$path" == "not" ]]; then
              continue
            fi

            # Skip standard system libraries that should exist on target
            if [[ "$lib" == "libc.so"* ]] || [[ "$lib" == "libm.so"* ]] || [[ "$lib" == "libpthread.so"* ]] || \
               [[ "$lib" == "libdl.so"* ]] || [[ "$lib" == "librt.so"* ]] || [[ "$lib" == "libgcc_s.so"* ]]; then
              continue
            fi

            # Copy the library if it exists
            if [[ -f "$path" ]]; then
              echo "Copying: $lib"
              cp -L "$path" "$LIBDIR/"
            fi
          done

          # List bundled libraries
          echo "=== Bundled libraries ==="
          ls -la "$LIBDIR/"

          # Create wrapper script to set LD_LIBRARY_PATH
          cat > package/orca-slice-engine/run.sh << 'WRAPPER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
          exec "$SCRIPT_DIR/orca-slice-engine" "$@"
          WRAPPER
          chmod +x package/orca-slice-engine/run.sh

          # Create tarball
          cd package
          tar -czvf ../orca-slice-engine-linux-x64-${{ steps.version.outputs.ver }}.tar.gz orca-slice-engine

          # Get file size
          SIZE=$(stat -c%s "../orca-slice-engine-linux-x64-${{ steps.version.outputs.ver }}.tar.gz")
          echo "package_size=$(numfmt --to=iec $SIZE)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orca-slice-engine-linux-x64-${{ steps.version.outputs.ver }}
          path: orca-slice-engine-linux-x64-${{ steps.version.outputs.ver }}.tar.gz
          retention-days: 30

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.ver }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${{ steps.version.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Size**: ${{ steps.package.outputs.package_size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Package Contents" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tar -tzf orca-slice-engine-linux-x64-${{ steps.version.outputs.ver }}.tar.gz | head -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
